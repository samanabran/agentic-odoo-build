events {
    worker_connections 1024;
}

http {
    upstream odoo {
        server odoo:8069;
    }

    upstream orchestrator {
        server orchestrator:8088;
    }

    upstream litellm_proxy {
        server litellm:4000;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 50m;

        # Orchestrator API
        location /orch/ {
            rewrite ^/orch/(.*)$ /$1 break;
            proxy_pass http://orchestrator;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # LiteLLM gateway — internal dev access only; lock this down in prod
        location /litellm/ {
            rewrite ^/litellm/(.*)$ /$1 break;
            proxy_pass http://litellm_proxy;
            proxy_set_header Host $host;
        }

        # Odoo longpolling (WebSocket)
        location /longpolling/ {
            proxy_pass http://odoo;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Odoo (everything else)
        location / {
            proxy_pass http://odoo;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
