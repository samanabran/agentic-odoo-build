services:

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  odoo:
    image: odoo@sha256:b79d87a4ec1a3806d133e12a07dc06402fc37397eb285663b1acfea2001ae52c
    depends_on:
      db:
        condition: service_healthy
    command: odoo --addons-path=/mnt/extra-addons,/mnt/extra-addons/vendor/odoo-llm --dev=xml
    environment:
      HOST: db
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD:-odoo}
    volumes:
      - ../addons:/mnt/extra-addons
      - odoo_data:/var/lib/odoo
    ports:
      - "8069:8069"

  orchestrator:
    build:
      context: ../orchestrator
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      ORCH_PORT: ${ORCH_PORT:-8088}
      ORCH_JWT_SECRET: ${ORCH_JWT_SECRET}
      ORCH_REDIS_URL: ${ORCH_REDIS_URL:-redis://redis:6379/0}
      LITELLM_BASE_URL: http://litellm:4000
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PRIVATE_MODE: ${PRIVATE_MODE:-false}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
      OTEL_SERVICE_NAME: orchestrator
      REDACTION_CONFIG: /infra/redaction.yaml
      USER_DAILY_BUDGET_TOKENS: ${USER_DAILY_BUDGET_TOKENS:-50000}
      TENANT_MONTHLY_BUDGET_USD: ${TENANT_MONTHLY_BUDGET_USD:-200}
    ports:
      - "8088:8088"
    volumes:
      - ../orchestrator:/orchestrator
      - ../infra:/infra:ro

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-odoo}:${POSTGRES_PASSWORD:-odoo}@db:5432/litellm
      STORE_MODEL_IN_DB: "True"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:4000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4318:4318"   # OTLP HTTP receiver
      - "16686:16686" # Jaeger UI
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14269/"]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    depends_on:
      - odoo
      - orchestrator
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"

  # ── Private profile ────────────────────────────────────────────────────────
  # Only started with `make up-private`. Required when PRIVATE_MODE=true.
  ollama:
    image: ollama/ollama:latest
    profiles: [private]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # GPU support: uncomment if NVIDIA GPU is available
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  db_data:
  redis_data:
  odoo_data:
  ollama_data:
